[platformio]
src_dir  = firmware/src
include_dir = firmware/include

[env:imu-test]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB
monitor_speed = 115200
build_src_filter = -<*> +<imu_test.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ── IMU test mode — uncomment one line below ──────────────
    ; (default) serial only: verbose table + bar graphs @ 10 Hz
    ; -DIMU_WIFI=1  ; WiFi UDP: CSV stream to imu_visualizer.py @ 100 Hz

lib_deps =
    adafruit/Adafruit LSM6DS@^4.7.2
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit Unified Sensor@^1.1.14

; ─────────────────────────────────────────────────────────────
[env:mic_test]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

; Requires arduino-esp32 >= 3.0.0 (ESP-IDF v5.1+) for driver/i2s_std.h
; If i2s_std.h is missing, upgrade: pio pkg update -e mic_test

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed    = 921600
build_src_filter = -<*> +<mic_test.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; No extra lib_deps — WiFi/WebServer built-in, I²S from ESP-IDF

; ─────────────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; TFT display (configure User_Setup.h for pin mapping)
    bodmer/TFT_eSPI
    ; IMU — LSM6DSOX
    adafruit/Adafruit LSM6DS@^4.7.2
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; Fuel gauge — MAX17048
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library@^1.0.4

; ─────────────────────────────────────────────────────────────
[env:voicebox]
; Main talking-agent firmware — WebSocket audio stream to Python server
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed    = 115200
build_src_filter = -<*> +<main.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; WebSocket client
    https://github.com/Links2004/arduinoWebSockets
    ; Health dashboard HTTP server
    https://github.com/me-no-dev/AsyncTCP#master
    https://github.com/me-no-dev/ESPAsyncWebServer#master
    ; Fuel gauge (MAX17048)
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library@^1.0.4
