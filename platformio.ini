[platformio]
src_dir  = firmware/src
include_dir = firmware/include

[env:imu-test]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed = 115200
build_src_filter = -<*> +<imu_test.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit LSM6DS@^4.7.2
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit Unified Sensor@^1.1.14

; ─────────────────────────────────────────────────────────────
[env:mic-test]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed = 115200
build_src_filter = -<*> +<mic_test.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; No extra lib_deps — uses ESP-IDF's built-in driver/i2s.h

; ─────────────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
platform = espressif32
board    = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 16MB

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; TFT display (configure User_Setup.h for pin mapping)
    bodmer/TFT_eSPI
    ; IMU — LSM6DSOX
    adafruit/Adafruit LSM6DS@^4.7.2
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; Fuel gauge — MAX17048
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library@^1.0.4
